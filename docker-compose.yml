version: '3.8'

services:
  # ───────────────────────────────────────────────────────────────────
  # DATABASE SERVICE (Postgres với pgvector)
  # Chạy trực tiếp trên VPS để lưu trữ dữ liệu cục bộ
  # ───────────────────────────────────────────────────────────────────
  cv_mentor_db:
    image: ankane/pgvector:v0.5.1  # Sử dụng image tích hợp sẵn pgvector cho AI search
    container_name: cv_mentor_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}  # Giá trị sẽ được lấy từ file .env
      POSTGRES_DB: ${POSTGRES_DB:-cv_mentor}
    ports:
      - "5433:5432"  # Ánh xạ ra ngoài cổng 5433 trên host để kết nối ngoài nếu cần quản trị
    volumes:
      - cv_mentor_postgres_data:/var/lib/postgresql/data
    networks:
      - cv_mentor_network

  # ───────────────────────────────────────────────────────────────────
  # BACKEND SERVICE (FastAPI)
  # ───────────────────────────────────────────────────────────────────
  cv_mentor_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cv_mentor_backend
    restart: always
    env_file:
      - .env  # Nạp toàn bộ các cấu hình bảo mật từ file .env ở máy chủ vào container
    depends_on:
      - cv_mentor_db  # Chờ database container khởi động trước
    networks:
      - cv_mentor_network

  # ───────────────────────────────────────────────────────────────────
  # FRONTEND & REVERSE PROXY SERVICE (Vue.js + Nginx)
  # ───────────────────────────────────────────────────────────────────
  cv_mentor_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cv_mentor_frontend
    restart: always
    ports:
      - "80:80"  # Expose cổng 80 của VPS (Nginx) ra ngoài internet
    volumes:
      # Gắn file cấu hình Nginx từ ngoài vào để xử lý định tuyến/WebSockets
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - cv_mentor_backend
    networks:
      - cv_mentor_network

  # ───────────────────────────────────────────────────────────────────
  # CLOUDFLARE TUNNEL SERVICE
  # ───────────────────────────────────────────────────────────────────
  cv_mentor_tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cv_mentor_tunnel
    restart: always
    # Khởi chạy tunnel sử dụng token nạp từ file .env
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - cv_mentor_frontend
    networks:
      - cv_mentor_network

volumes:
  cv_mentor_postgres_data:

networks:
  cv_mentor_network:
    driver: bridge
